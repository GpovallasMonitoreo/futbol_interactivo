<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penaltis Progresivos ⚽ Juego del Mundial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .game-container {
            width: 612px;
            height: 612px;
            background-image: url('image_8.png'); /* Usa tu imagen aquí */
            background-size: cover;
            position: relative;
            border: 5px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair; /* Mira de puntería */
        }

        #scoreboard {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
        }

        .pitch {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Elementos más grandes */
        #keeper {
            position: absolute;
            bottom: 230px; /* Ajustado para la portería en la imagen */
            left: 50%;
            transform: translateX(-50%);
            font-size: 110px; /* Guante más grande */
            transition: left 0.016s linear; /* Movimiento suave */
            z-index: 10;
            pointer-events: none;
        }

        #ball {
            position: absolute;
            bottom: 60px; /* Cerca del punto de penal de la imagen */
            left: 50%;
            transform: translateX(-50%);
            font-size: 90px; /* Balón más grande */
            transition: bottom 0.5s ease-out, left 0.5s ease-out, transform 0.5s ease-out;
            z-index: 20;
            pointer-events: none;
        }

        /* Línea de puntería blanca transparente */
        #aim-line {
            position: absolute;
            bottom: 60px; /* Parte del balón */
            left: 50%;
            width: 6px;
            height: 0;
            background-color: rgba(255, 255, 255, 0.3); /* Transparente */
            transform-origin: bottom center;
            z-index: 15;
            pointer-events: none;
            display: none; /* Oculta inicialmente */
        }

        #feedback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            font-weight: bold;
            text-shadow: 0 0 10px #000;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 30;
            pointer-events: none;
        }

        #game-over-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #game-over-panel h2 {
            font-size: 50px;
            margin-bottom: 30px;
            color: #ff4444;
        }

        #game-over-panel p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        #game-over-panel button {
            font-size: 24px;
            padding: 15px 30px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="scoreboard">Goles: <span id="score">0</span></div>
        
        <div class="pitch">
            <div id="keeper">🧤</div>
            <div id="ball">⚽</div>
            <div id="aim-line"></div>
            <div id="feedback-msg"></div>
        </div>

        <div id="game-over-panel">
            <h2>¡JUEGO TERMINADO!</h2>
            <p>Puntuación final: <span id="final-score">0</span></p>
            <p>El portero te detuvo. ¡No pudiste alargar el partido!</p>
            <button onclick="resetGame()">Reiniciar Partido</button>
        </div>
    </div>

    <script>
        const gameContainer = document.querySelector('.game-container');
        const pitch = document.querySelector('.pitch');
        const ball = document.getElementById('ball');
        const keeper = document.getElementById('keeper');
        const scoreDisplay = document.getElementById('score');
        const aimLine = document.getElementById('aim-line');
        const feedbackMsg = document.getElementById('feedback-msg');
        const gameOverPanel = document.getElementById('game-over-panel');
        const finalScoreDisplay = document.getElementById('final-score');

        // Estado del juego
        let score = 0;
        let isShooting = false;
        let gameOver = false;
        
        // Configuración de velocidad
        let initialKeeperSpeed = 0.5; // Velocidad inicial lenta
        let speedIncreasePerGoal = 0.1; // Cuánto aumenta por gol
        let currentKeeperSpeed = initialKeeperSpeed;
        
        // Configuración de movimiento
        let keeperDirection = 1; // 1 = derecha, -1 = izquierda
        let keeperPositionPercent = 50; // Posición de porcentaje de ancho

        // Definición de las Hitboxes de colisión para la imagen 612x612
        // Estas son estimaciones de dónde está la portería en el fondo
        const goalRangeX = { min: 110, max: 500 };
        const goalRangeY = { min: 150, max: 480 };

        // Animación del Portero
        function animateKeeper() {
            if (gameOver) return;
            
            keeperPositionPercent += currentKeeperSpeed * keeperDirection;
            
            // Límites del movimiento del portero dentro del marco blanco de la imagen
            if (keeperPositionPercent > 65) { // Cerca del poste derecho
                keeperDirection = -1;
            } else if (keeperPositionPercent < 35) { // Cerca del poste izquierdo
                keeperDirection = 1;
            }
            
            keeper.style.left = keeperPositionPercent + '%';
            requestAnimationFrame(animateKeeper);
        }

        // Iniciar el movimiento
        animateKeeper();

        // Lógica de Puntería (Línea)
        pitch.addEventListener('mousemove', function(e) {
            if (isShooting || gameOver) return;

            const rect = pitch.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Punto de origen (centro del balón en su posición inicial)
            const startX = rect.width / 2;
            const startY = rect.height - 60; // Posición 'bottom' inicial

            // Calcular ángulo y longitud
            const dx = clickX - startX;
            const dy = clickY - startY;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dx, -dy) * (180 / Math.PI); // dy invertido para ángulo de CSS

            // Actualizar la línea blanca transparente
            aimLine.style.height = length + 'px';
            aimLine.style.transform = `translateX(-50%) rotate(${angle}deg)`;
            aimLine.style.display = 'block';
        });

        // Ocultar línea al salir del área
        pitch.addEventListener('mouseleave', function() {
            if (isShooting) return;
            aimLine.style.display = 'none';
        });

        // Lógica de Disparo (Clic)
        pitch.addEventListener('click', function(e) {
            if (isShooting || gameOver) return;
            
            isShooting = true;
            aimLine.style.display = 'none'; // Ocultar la línea al disparar

            const rect = pitch.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Mover el balón a donde toques con el dedo
            ball.style.bottom = (rect.height - clickY) + 'px';
            ball.style.left = clickX + 'px';
            ball.style.transform = 'translateX(-50%) rotate(360deg)';

            // Evaluar resultado después de la animación (0.5s)
            setTimeout(() => {
                evaluateShot(clickX, clickY);
            }, 500);
        });

        function evaluateShot(targetX, targetY) {
            const ballRect = ball.getBoundingClientRect();
            const keeperRect = keeper.getBoundingClientRect();
            const pitchRect = pitch.getBoundingClientRect();

            // Detectar colisión con el portero (Hitbox del emoji)
            const hitKeeper = !(
                ballRect.top > keeperRect.bottom ||
                ballRect.bottom < keeperRect.top ||
                ballRect.right < keeperRect.left ||
                ballRect.left > keeperRect.right
            );

            // Detectar si el disparo fue dentro del marco de la portería
            const inGoal = targetX >= goalRangeX.min && targetX <= goalRangeX.max && targetY >= goalRangeY.min && targetY <= goalRangeY.max;

            if (hitKeeper) {
                // El portero te detuvo, pierdes
                showMessage("¡ATAJADA!", "#ff4444");
                finalScoreDisplay.innerText = score;
                gameOver = true;
                gameOverPanel.style.display = 'flex';
                ball.style.transition = 'none'; // Detener transición para reiniciar
            } else if (inGoal) {
                // Gol, la racha continúa
                score++;
                scoreDisplay.innerText = score;
                showMessage("¡GOLAZO!", "#ffcc00");
                currentKeeperSpeed += speedIncreasePerGoal; // Aumentar velocidad del portero
                setTimeout(resetBall, 1000);
            } else {
                // Fuera, pierdes
                showMessage("¡FUERA!", "white");
                finalScoreDisplay.innerText = score;
                gameOver = true;
                gameOverPanel.style.display = 'flex';
                ball.style.transition = 'none'; // Detener transición para reiniciar
            }
        }

        function showMessage(text, color) {
            feedbackMsg.innerText = text;
            feedbackMsg.style.color = color;
            feedbackMsg.style.opacity = 1;
            setTimeout(() => {
                feedbackMsg.style.opacity = 0;
            }, 800);
        }

        function resetBall() {
            if (gameOver) return;
            ball.style.transition = 'none'; // Reinicio inmediato
            ball.style.bottom = '60px';
            ball.style.left = '50%';
            ball.style.transform = 'translateX(-50%) rotate(0deg)';
            
            // Forzar reflow para que la transición vuelva a funcionar
            void ball.offsetWidth;
            ball.style.transition = 'bottom 0.5s ease-out, left 0.5s ease-out, transform 0.5s ease-out';
            
            isShooting = false;
        }

        function resetGame() {
            score = 0;
            scoreDisplay.innerText = score;
            currentKeeperSpeed = initialKeeperSpeed;
            gameOver = false;
            isShooting = false;
            gameOverPanel.style.display = 'none';
            
            // Reiniciar posiciones
            resetBall();
            keeper.style.transition = 'none';
            keeperPositionPercent = 50;
            keeper.style.left = keeperPositionPercent + '%';
            void keeper.offsetWidth;
            keeper.style.transition = 'left 0.016s linear';
            
            animateKeeper(); // Reiniciar animación del portero
        }
    </script>
</body>
</html>
