<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial 2026 AR - Penales Progresivos</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: transparent; touch-action: none; 
            font-family: sans-serif;
        }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: auto; /* Captura los gestos táctiles */
            display: flex; flex-direction: column; align-items: center;
            color: white;
        }

        #score-board {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.7); padding: 10px 20px;
            border-radius: 10px; border: 2px solid #00ffff;
            font-size: 24px; font-weight: bold; pointer-events: none;
        }

        #scanning-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
            text-align: center; pointer-events: none;
        }

        #hint {
            position: absolute; bottom: 40px; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 20px; display: none; pointer-events: none;
        }

        /* Línea de puntería */
        #aim-line {
            position: absolute;
            width: 4px;
            height: 0;
            background-color: rgba(255, 255, 255, 0.6);
            transform-origin: top center;
            z-index: 15;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; pointer-events: auto; color: white;
        }

        #game-over-screen h1 { font-size: 50px; margin-bottom: 10px; text-shadow: 2px 2px 5px black; }
        #game-over-screen p { font-size: 24px; margin-bottom: 30px; }
        
        #restart-btn {
            padding: 15px 40px; font-size: 20px; background-color: white; color: red;
            border: none; font-weight: bold; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-board">Goles: <span id="score">0</span></div>
        <div id="scanning-overlay">Apunta la cámara a la imagen del Mundial</div>
        <div id="hint">👆 Desliza el dedo para definir fuerza y trayectoria</div>
        <div id="aim-line"></div>
    </div>

    <div id="game-over-screen">
        <h1>¡ATAJADA!</h1>
        <p>Goles anotados: <span id="final-score">0</span></p>
        <button id="restart-btn" onclick="resetGame()">VOLVER A INTENTAR</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Usamos imágenes externas directas para tener los emojis en Alta Calidad en 3D -->
            <img id="img-guante" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f9e4.png" crossorigin="anonymous">
            <img id="img-balon" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/26bd.png" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            
            <!-- Marco de la Portería (Transparente en el centro) -->
            <a-entity position="0 0.15 -0.05">
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="-0.4 0 0"></a-box>
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="0.4 0 0"></a-box>
                <a-box color="white" height="0.02" width="0.8" depth="0.02" position="0 0.2 0"></a-box>
            </a-entity>

            <!-- Guante del Portero (Imagen plana en AR) -->
            <a-image id="keeper-3d" src="#img-guante" width="0.2" height="0.2" position="0 0.1 0" transparent="true"></a-image>
            
            <!-- Balón (Imagen plana en AR) -->
            <a-image id="ball-3d" src="#img-balon" width="0.1" height="0.1" position="0 -0.3 0.15" transparent="true"></a-image>

        </a-entity>
    </a-scene>

    <script>
        let score = 0;
        let isShooting = false;
        let keeperDirection = 1;
        let keeperSpeed = 0.01; // Velocidad inicial lenta
        let animationFrameId;
        let shotAnimationId;

        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scanningOverlay = document.getElementById('scanning-overlay');
        const hintEl = document.getElementById('hint');
        const uiLayer = document.getElementById('ui-layer');
        const aimLine = document.getElementById('aim-line');
        
        const targetEntity = document.getElementById('ar-target');
        const keeper3D = document.getElementById('keeper-3d');
        const ball3D = document.getElementById('ball-3d');

        const startPos = { x: 0, y: -0.3, z: 0.15 };

        // Variables para el gesto "Deslizar" (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        targetEntity.addEventListener("targetFound", () => {
            scanningOverlay.style.display = "none";
            hintEl.style.display = "block";
            startGameLoop();
        });

        targetEntity.addEventListener("targetLost", () => {
            scanningOverlay.style.display = "block";
            hintEl.style.display = "none";
            cancelAnimationFrame(animationFrameId);
        });

        function startGameLoop() {
            let keeperPos = keeper3D.getAttribute('position');
            keeperPos.x += keeperSpeed * keeperDirection;
            
            if (keeperPos.x > 0.35 || keeperPos.x < -0.35) {
                keeperDirection *= -1;
            }
            keeper3D.setAttribute('position', keeperPos);
            animationFrameId = requestAnimationFrame(startGameLoop);
        }

        // --- LÓGICA DE FUERZA Y TRAYECTORIA --- //

        uiLayer.addEventListener('pointerdown', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex") return;
            touchStartX = e.clientX;
            touchStartY = e.clientY;
            
            aimLine.style.display = 'block';
            aimLine.style.left = touchStartX + 'px';
            aimLine.style.top = touchStartY + 'px';
            aimLine.style.height = '0px';
            hintEl.style.display = "none";
        });

        uiLayer.addEventListener('pointermove', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex" || !touchStartX) return;
            
            let currentX = e.clientX;
            let currentY = e.clientY;

            let dx = currentX - touchStartX;
            let dy = currentY - touchStartY;
            
            // Distancia = Fuerza
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Ángulo de la línea
            let angle = Math.atan2(dy, dx) * (180 / Math.PI) - 90;

            aimLine.style.height = distance + 'px';
            aimLine.style.transform = `rotate(${angle}deg)`;
        });

        uiLayer.addEventListener('pointerup', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex" || !touchStartX) return;
            
            let touchEndX = e.clientX;
            let touchEndY = e.clientY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;

            // Restablecer gestos
            aimLine.style.display = 'none';
            touchStartX = 0;
            touchStartY = 0;

            // Calcular Fuerza (Longitud del deslizamiento)
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Si fue un toque simple sin arrastrar, ignorar o disparar al centro suave
            if (distance < 20) return; 

            // Determinar velocidad de la animación basado en la fuerza
            // Distancia mayor = progressIncrease mayor = balón viaja más rápido
            let shotPower = Math.min(distance / 500, 1); // Normaliza entre 0 y 1
            let baseSpeed = 0.02;
            let speedModifier = baseSpeed + (shotPower * 0.04); 

            // Mapear trayectoria al marco 3D
            // Invertimos las coordenadas para que si deslizas hacia la izquierda, vaya a la izquierda
            const targetX = (dx / window.innerWidth) * 2; 
            const targetY = (-dy / window.innerHeight) * 2 - 0.1; // Ajuste para elevar el balón

            shootBall(targetX, targetY, speedModifier);
        });

        // --- ANIMACIÓN 3D Y COLISIONES --- //

        function shootBall(targetX, targetY, speedModifier) {
            isShooting = true;

            let currentPos = { ...startPos };
            let progress = 0;
            const targetPos = { x: targetX, y: targetY, z: -0.05 }; 

            function animateShot() {
                progress += speedModifier; // La fuerza define qué tan rápido suma progreso
                if (progress > 1) progress = 1;

                currentPos.x = startPos.x + (targetPos.x - startPos.x) * progress;
                currentPos.y = startPos.y + (targetPos.y - startPos.y) * progress;
                currentPos.z = startPos.z + (targetPos.z - startPos.z) * progress;

                // Rotar el balón para efecto visual mientras viaja
                ball3D.setAttribute('rotation', `0 0 ${progress * 720}`);
                ball3D.setAttribute('position', currentPos);

                // Checkear colisión cuando cruza el eje Z del portero
                if (currentPos.z <= 0.02 && currentPos.z >= -0.02) {
                    let kPos = keeper3D.getAttribute('position');
                    
                    // Hitbox: distancia entre el guante y el balón
                    let diffX = Math.abs(currentPos.x - kPos.x);
                    let diffY = Math.abs(currentPos.y - kPos.y);
                    
                    if (diffX < 0.18 && diffY < 0.2) {
                        cancelAnimationFrame(shotAnimationId);
                        triggerGameOver();
                        return;
                    }
                }

                if (progress < 1) {
                    shotAnimationId = requestAnimationFrame(animateShot);
                } else {
                    // Evaluar si entró en el rango del marco o se voló
                    if(currentPos.x > -0.4 && currentPos.x < 0.4 && currentPos.y > -0.1 && currentPos.y < 0.35){
                        scoreGoal();
                    } else {
                        triggerGameOver(); // Tiraste fuera del marco
                    }
                }
            }
            
            shotAnimationId = requestAnimationFrame(animateShot);
        }

        function scoreGoal() {
            score++;
            scoreEl.innerText = score;
            keeperSpeed += 0.002; // Aumentar dificultad progresivamente
            
            setTimeout(() => {
                resetBall();
            }, 800);
        }

        function triggerGameOver() {
            cancelAnimationFrame(animationFrameId);
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = "flex";
        }

        function resetBall() {
            ball3D.setAttribute('position', startPos);
            ball3D.setAttribute('rotation', '0 0 0');
            isShooting = false;
            hintEl.style.display = "block";
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            keeperSpeed = 0.01; // Restablecer velocidad lenta
            resetBall();
            gameOverScreen.style.display = "none";
            startGameLoop();
        }
    </script>
</body>
</html>
