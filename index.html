<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial 2026 AR - Torneo Oficial</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* MODIFICADO: background-color regresó a transparent para que la cámara no se tape */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: transparent; touch-action: none; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* PANTALLA DE INICIO (Registro) */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 20, 35, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white;
        }

        #login-screen h1 { font-size: 3rem; color: #00ffff; margin-bottom: 20px; text-shadow: 0 0 10px #00ffff; text-align: center; }
        
        #player-name {
            font-size: 1.5rem; padding: 10px; margin-bottom: 20px;
            border-radius: 8px; border: 2px solid #00ffff; background: transparent;
            color: white; text-align: center; outline: none; width: 80%; max-width: 300px;
        }

        #start-btn {
            font-size: 1.5rem; padding: 15px 40px; background-color: #00ffff; color: #061423;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #00ffff; transition: transform 0.1s;
        }
        #start-btn:active { transform: scale(0.95); }

        /* CAPA UI DEL JUEGO */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: auto; /* Permite deslizar para jugar */
            display: none; flex-direction: column; justify-content: space-between;
            color: white; padding: 15px; box-sizing: border-box;
        }

        .top-bar { display: flex; justify-content: space-between; pointer-events: none; }

        #score-panel {
            background: rgba(0, 0, 0, 0.7); padding: 10px 15px;
            border-radius: 10px; border: 1px solid #00ffff;
            font-size: 18px; font-weight: bold; pointer-events: none;
        }

        /* TABLERO DE LÍDERES EN EL JUEGO */
        #leaderboard-panel {
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 10px; border: 1px solid #00ffff;
            font-size: 14px; pointer-events: none; min-width: 120px;
        }
        #leaderboard-panel h3 { margin: 0 0 5px 0; color: #00ffff; border-bottom: 1px solid #00ffff; padding-bottom: 3px; font-size: 16px; text-align: center;}
        .lb-row { display: flex; justify-content: space-between; margin-bottom: 3px; }

        #scanning-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            text-align: center; pointer-events: none; border: 1px solid #fff;
        }

        #hint {
            align-self: center; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 20px; display: none; pointer-events: none; margin-bottom: 30px;
        }

        /* Línea de puntería interactiva */
        #aim-line {
            position: absolute; width: 4px; height: 0;
            background-color: rgba(0, 255, 255, 0.8); 
            transform-origin: top center; z-index: 15; pointer-events: none;
            display: none; box-shadow: 0 0 10px rgba(0, 255, 255, 1);
        }

        /* PANTALLA FIN DE JUEGO */
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; pointer-events: auto; color: white; text-align: center;
        }
        #game-over-screen h1 { font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 5px black; }
        #restart-btn {
            margin-top: 20px; padding: 15px 40px; font-size: 20px; background-color: white; color: red;
            border: none; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>MUNDIAL 2026 AR</h1>
        <input type="text" id="player-name" placeholder="Ingresa tu nombre" maxlength="12" autocomplete="off">
        <button id="start-btn" onclick="initGame()">ENTRAR A LA CANCHA</button>
    </div>

    <div id="ui-layer">
        <div class="top-bar">
            <div id="score-panel">
                <div style="color:#00ffff;" id="display-name">JUGADOR</div>
                <div>Goles: <span id="score">0</span></div>
            </div>
            
            <div id="leaderboard-panel">
                <h3>TOP GOLEADORES</h3>
                <div id="leaderboard-list"></div>
            </div>
        </div>
        
        <div id="scanning-overlay">Apunta la cámara a la imagen del Mundial</div>
        <div id="hint">👆 Desliza el dedo para disparar</div>
        <div id="aim-line"></div>
    </div>

    <div id="game-over-screen">
        <h1>¡ATAJADA!</h1>
        <p style="font-size: 24px;">Fin de la racha</p>
        <button id="restart-btn" onclick="resetGame()">VOLVER A INTENTAR</button>
    </div>

    <!-- Escena AR estabilizada -->
    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <!-- MODIFICADO: De regreso a los modelos 3D .glb -->
        <a-assets>
            <a-asset-item id="modelo-balon" src="balon.glb"></a-asset-item>
            <a-asset-item id="modelo-portero" src="portero.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            
            <a-entity position="0 0.15 -0.05">
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="-0.4 0 0"></a-box>
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="0.4 0 0"></a-box>
                <a-box color="white" height="0.02" width="0.8" depth="0.02" position="0 0.2 0"></a-box>
            </a-entity>

            <!-- MODIFICADO: Uso de a-gltf-model nuevamente para renderizar tus archivos 3D -->
            <a-gltf-model id="keeper-3d" src="#modelo-portero" scale="0.15 0.15 0.15" position="0 0.1 0"></a-gltf-model>
            <a-gltf-model id="ball-3d" src="#modelo-balon" scale="0.05 0.05 0.05" position="0 -0.3 0.15"></a-gltf-model>

        </a-entity>
    </a-scene>

    <script>
        // Variables Globales
        let currentPlayer = "";
        let score = 0;
        let isShooting = false;
        let keeperDirection = 1;
        let keeperSpeed = 0.01;
        let animationFrameId;
        let shotAnimationId;

        // Elementos DOM
        const loginScreen = document.getElementById('login-screen');
        const uiLayer = document.getElementById('ui-layer');
        const playerNameInput = document.getElementById('player-name');
        const displayName = document.getElementById('display-name');
        const scoreEl = document.getElementById('score');
        const leaderboardList = document.getElementById('leaderboard-list');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scanningOverlay = document.getElementById('scanning-overlay');
        const hintEl = document.getElementById('hint');
        const aimLine = document.getElementById('aim-line');
        
        const targetEntity = document.getElementById('ar-target');
        const keeper3D = document.getElementById('keeper-3d');
        const ball3D = document.getElementById('ball-3d');

        const startPos = { x: 0, y: -0.3, z: 0.15 };
        let touchStartX = 0;
        let touchStartY = 0;

        // Inicialización y Login
        function initGame() {
            const name = playerNameInput.value.trim().toUpperCase();
            if (name === "") {
                alert("Por favor, ingresa tu nombre para el tablero.");
                return;
            }
            currentPlayer = name;
            displayName.innerText = currentPlayer;
            
            loginScreen.style.display = "none";
            uiLayer.style.display = "flex";
            
            loadLeaderboard();
        }

        // Eventos AR
        targetEntity.addEventListener("targetFound", () => {
            scanningOverlay.style.display = "none";
            hintEl.style.display = "block";
            startGameLoop();
        });

        targetEntity.addEventListener("targetLost", () => {
            scanningOverlay.style.display = "block";
            hintEl.style.display = "none";
            cancelAnimationFrame(animationFrameId);
        });

        // Bucle del Portero
        function startGameLoop() {
            let keeperPos = keeper3D.getAttribute('position');
            keeperPos.x += keeperSpeed * keeperDirection;
            
            if (keeperPos.x > 0.35 || keeperPos.x < -0.35) {
                keeperDirection *= -1;
            }
            keeper3D.setAttribute('position', keeperPos);
            animationFrameId = requestAnimationFrame(startGameLoop);
        }

        // SISTEMA DE GESTOS (SWIPE)
        uiLayer.addEventListener('pointerdown', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex") return;
            touchStartX = e.clientX;
            touchStartY = e.clientY;
            
            aimLine.style.display = 'block';
            aimLine.style.left = touchStartX + 'px';
            aimLine.style.top = touchStartY + 'px';
            aimLine.style.height = '0px';
            hintEl.style.display = "none";
        });

        uiLayer.addEventListener('pointermove', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex" || !touchStartX) return;
            
            let currentX = e.clientX;
            let currentY = e.clientY;
            let dx = currentX - touchStartX;
            let dy = currentY - touchStartY;
            
            let distance = Math.sqrt(dx * dx + dy * dy);
            let angle = Math.atan2(dy, dx) * (180 / Math.PI) - 90;

            aimLine.style.height = distance + 'px';
            aimLine.style.transform = `rotate(${angle}deg)`;
        });

        uiLayer.addEventListener('pointerup', (e) => {
            if (isShooting || gameOverScreen.style.display === "flex" || !touchStartX) return;
            
            let dx = e.clientX - touchStartX;
            let dy = e.clientY - touchStartY;

            aimLine.style.display = 'none';
            touchStartX = 0;
            touchStartY = 0;

            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < 20) return; 

            let shotPower = Math.min(distance / 500, 1); 
            let baseSpeed = 0.025;
            let speedModifier = baseSpeed + (shotPower * 0.04); 

            const targetX = (dx / window.innerWidth) * 2.5; 
            const targetY = (-dy / window.innerHeight) * 2 - 0.1; 

            shootBall(targetX, targetY, speedModifier);
        });

        // ANIMACIÓN Y FÍSICAS
        function shootBall(targetX, targetY, speedModifier) {
            isShooting = true;

            let currentPos = { ...startPos };
            let progress = 0;
            const targetPos = { x: targetX, y: targetY, z: -0.05 }; 

            function animateShot() {
                progress += speedModifier; 
                if (progress > 1) progress = 1;

                currentPos.x = startPos.x + (targetPos.x - startPos.x) * progress;
                currentPos.y = startPos.y + (targetPos.y - startPos.y) * progress;
                currentPos.z = startPos.z + (targetPos.z - startPos.z) * progress;

                ball3D.setAttribute('rotation', `${progress * 720} 0 0`);
                ball3D.setAttribute('position', currentPos);

                // Colisión (Hitbox)
                if (currentPos.z <= 0.02 && currentPos.z >= -0.02) {
                    let kPos = keeper3D.getAttribute('position');
                    let diffX = Math.abs(currentPos.x - kPos.x);
                    let diffY = Math.abs(currentPos.y - kPos.y);
                    
                    if (diffX < 0.18 && diffY < 0.2) {
                        cancelAnimationFrame(shotAnimationId);
                        triggerGameOver();
                        return;
                    }
                }

                if (progress < 1) {
                    shotAnimationId = requestAnimationFrame(animateShot);
                } else {
                    if(currentPos.x > -0.4 && currentPos.x < 0.4 && currentPos.y > -0.1 && currentPos.y < 0.35){
                        scoreGoal();
                    } else {
                        triggerGameOver(); 
                    }
                }
            }
            shotAnimationId = requestAnimationFrame(animateShot);
        }

        function scoreGoal() {
            score++;
            scoreEl.innerText = score;
            keeperSpeed += 0.002; 
            saveScore(); 
            setTimeout(() => { resetBall(); }, 800);
        }

        function triggerGameOver() {
            cancelAnimationFrame(animationFrameId);
            saveScore(); 
            gameOverScreen.style.display = "flex";
        }

        function resetBall() {
            ball3D.setAttribute('position', startPos);
            ball3D.setAttribute('rotation', '0 0 0');
            isShooting = false;
            hintEl.style.display = "block";
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            keeperSpeed = 0.01; 
            resetBall();
            gameOverScreen.style.display = "none";
            startGameLoop();
        }

        // SISTEMA DE MARCADORES (LOCALSTORAGE)
        function saveScore() {
            let leaderboard = JSON.parse(localStorage.getItem('mundialARLeaderboard')) || [];
            const index = leaderboard.findIndex(p => p.name === currentPlayer);

            if (index !== -1) {
                if (score > leaderboard[index].score) leaderboard[index].score = score;
            } else {
                leaderboard.push({ name: currentPlayer, score: score });
            }

            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 5); 
            
            localStorage.setItem('mundialARLeaderboard', JSON.stringify(leaderboard));
            loadLeaderboard();
        }

        function loadLeaderboard() {
            let leaderboard = JSON.parse(localStorage.getItem('mundialARLeaderboard')) || [];
            leaderboardList.innerHTML = "";
            
            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = "<div style='text-align:center; color:#888;'>Sin registros</div>";
                return;
            }

            leaderboard.forEach(player => {
                const row = document.createElement('div');
                row.className = 'lb-row';
                const color = player.name === currentPlayer ? '#00ffff' : '#fff';
                row.innerHTML = `<span style="color:${color}">${player.name}</span> <span style="color:${color}; font-weight:bold;">${player.score}</span>`;
                leaderboardList.appendChild(row);
            });
        }
    </script>
</body>
</html>
