<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial 2026 AR - Interactivo</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Reseteo estricto para asegurar que el canvas y el video ocupen todo sin fondos */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent; 
            touch-action: none; 
        }
        
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            /* pointer-events en none permite que la cámara e interacciones fluyan correctamente */
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: white;
        }

        #score-board {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            font-size: 24px;
            font-weight: bold;
        }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.85);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto; /* Permite hacer clic en los botones de esta pantalla */
        }

        #game-over-screen h1 { font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 5px black; color: white;}
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: white;
            color: red;
            border: none;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: auto;
        }

        #scanning-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        #hint {
            position: absolute;
            bottom: 40px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Capa de Interfaz -->
    <div id="ui-layer">
        <div id="score-board">Goles: <span id="score">0</span></div>
        <div id="scanning-overlay">Apunta la cámara a la imagen del Mundial</div>
        <div id="hint">👆 Toca la pantalla para disparar</div>
    </div>

    <!-- Pantalla de Fin de Juego -->
    <div id="game-over-screen">
        <h1>¡ATAJADA!</h1>
        <button id="restart-btn" onclick="resetGame()">VOLVER A INTENTAR</button>
    </div>

    <!-- Escena AR -->
    <!-- Se añadieron uiLoading: no; y uiScanning: no; para evitar que bloqueen la cámara -->
    <a-scene mindar-image="imageTargetSrc: targets.mind; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelo-balon" src="balon.glb"></a-asset-item>
            <a-asset-item id="modelo-portero" src="portero.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            
            <!-- Marco de la Portería (Transparente en el centro) -->
            <a-entity position="0 0.15 -0.05">
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="-0.4 0 0"></a-box>
                <a-box color="white" height="0.4" width="0.02" depth="0.02" position="0.4 0 0"></a-box>
                <a-box color="white" height="0.02" width="0.8" depth="0.02" position="0 0.2 0"></a-box>
            </a-entity>

            <!-- Modelos 3D -->
            <a-gltf-model id="keeper-3d" src="#modelo-portero" scale="0.15 0.15 0.15" position="0 0.1 0"></a-gltf-model>
            <a-gltf-model id="ball-3d" src="#modelo-balon" scale="0.05 0.05 0.05" position="0 -0.3 0.15"></a-gltf-model>

        </a-entity>
    </a-scene>

    <script>
        let score = 0;
        let isShooting = false;
        let keeperDirection = 1;
        let keeperSpeed = 0.015;
        let animationFrameId;
        let shotAnimationId;

        const scoreEl = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scanningOverlay = document.getElementById('scanning-overlay');
        const hintEl = document.getElementById('hint');
        
        const targetEntity = document.getElementById('ar-target');
        const keeper3D = document.getElementById('keeper-3d');
        const ball3D = document.getElementById('ball-3d');

        const startPos = { x: 0, y: -0.3, z: 0.15 };

        // Mostrar elementos cuando la imagen es detectada
        targetEntity.addEventListener("targetFound", () => {
            scanningOverlay.style.display = "none";
            hintEl.style.display = "block";
            startGameLoop();
        });

        // Ocultar elementos si se pierde la imagen
        targetEntity.addEventListener("targetLost", () => {
            scanningOverlay.style.display = "block";
            hintEl.style.display = "none";
            cancelAnimationFrame(animationFrameId);
        });

        // Movimiento del portero
        function startGameLoop() {
            let keeperPos = keeper3D.getAttribute('position');
            keeperPos.x += keeperSpeed * keeperDirection;
            
            if (keeperPos.x > 0.35 || keeperPos.x < -0.35) {
                keeperDirection *= -1;
            }
            keeper3D.setAttribute('position', keeperPos);
            animationFrameId = requestAnimationFrame(startGameLoop);
        }

        // Lógica de disparo detectando el toque globalmente
        window.addEventListener('pointerdown', (event) => {
            // Ignorar el toque si es en el botón de reinicio, si ya está pateando o si perdió
            if (event.target.tagName === 'BUTTON' || isShooting || gameOverScreen.style.display === "flex") return;
            
            const rect = document.body.getBoundingClientRect();
            const touchX = event.clientX;
            const touchY = event.clientY;

            // Normalización para apuntar en 3D
            const normalizedX = (touchX / rect.width) * 2 - 1;
            const normalizedY = -(touchY / rect.height) * 2 + 1; 

            const targetX = normalizedX * 0.6; 
            const targetY = (normalizedY * 0.4) + 0.1; 

            shootBall(targetX, targetY);
        });

        function shootBall(targetX, targetY) {
            isShooting = true;
            hintEl.style.display = "none";

            let currentPos = { ...startPos };
            let progress = 0;
            const targetPos = { x: targetX, y: targetY, z: -0.05 }; 

            function animateShot() {
                progress += 0.04; 
                if (progress > 1) progress = 1;

                currentPos.x = startPos.x + (targetPos.x - startPos.x) * progress;
                currentPos.y = startPos.y + (targetPos.y - startPos.y) * progress;
                currentPos.z = startPos.z + (targetPos.z - startPos.z) * progress;

                ball3D.setAttribute('position', currentPos);

                // Colisión con el portero en el eje Z
                if (currentPos.z <= 0.02 && currentPos.z >= -0.02) {
                    let kPos = keeper3D.getAttribute('position');
                    let diffX = Math.abs(currentPos.x - kPos.x);
                    let diffY = Math.abs(currentPos.y - kPos.y);
                    
                    if (diffX < 0.15 && diffY < 0.2) {
                        cancelAnimationFrame(shotAnimationId);
                        triggerGameOver();
                        return;
                    }
                }

                if (progress < 1) {
                    shotAnimationId = requestAnimationFrame(animateShot);
                } else {
                    scoreGoal();
                }
            }
            
            shotAnimationId = requestAnimationFrame(animateShot);
        }

        function scoreGoal() {
            score++;
            scoreEl.innerText = score;
            keeperSpeed += 0.002; 
            
            setTimeout(() => {
                resetBall();
            }, 800);
        }

        function triggerGameOver() {
            cancelAnimationFrame(animationFrameId);
            gameOverScreen.style.display = "flex";
        }

        function resetBall() {
            ball3D.setAttribute('position', startPos);
            isShooting = false;
            hintEl.style.display = "block";
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            keeperSpeed = 0.015;
            resetBall();
            gameOverScreen.style.display = "none";
            startGameLoop();
        }
    </script>
</body>
</html>
