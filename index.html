<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial 2026 AR - Muerte Súbita</title>
    
    <!-- Librerías de A-Frame y MindAR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Interfaz 2D sobre la cámara AR */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none; /* Deja pasar los toques a la cámara, excepto en los botones */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            font-family: sans-serif;
            color: white;
        }

        #score-board {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #00ffff;
            font-size: 24px;
            font-weight: bold;
        }

        #shoot-btn {
            pointer-events: auto; /* El botón sí recibe toques */
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            background-color: #00ffff;
            color: #061423;
            border: none;
            border-radius: 50px;
            box-shadow: 0 0 15px #00ffff;
            cursor: pointer;
            margin-bottom: 30px;
            display: none; /* Oculto hasta que se detecte la imagen */
        }

        /* Pantalla de Fin de Juego */
        #game-over-screen {
            pointer-events: auto;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #game-over-screen h1 { font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 5px black; }
        #game-over-screen p { font-size: 20px; margin-bottom: 30px; }
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background-color: white;
            color: red;
            border: none;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Indicador de escaneo */
        #scanning-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Capa de Interfaz UI -->
    <div id="ui-layer">
        <div id="score-board">Goles: <span id="score">0</span></div>
        <div id="scanning-overlay">Apunta la cámara a la imagen del Mundial</div>
        <button id="shoot-btn" onclick="shootBall()">¡PATEAR!</button>
    </div>

    <!-- Pantalla de Muerte Súbita -->
    <div id="game-over-screen">
        <h1>¡ATAJADA!</h1>
        <p>Has sido eliminado.</p>
        <button id="restart-btn" onclick="resetGame()">VOLVER A INTENTAR</button>
    </div>

    <!-- Escena AR -->
    <!-- NOTA: El 'imageTargetSrc' necesita el archivo compilado .mind de tu imagen -->
    <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Aquí se anclan los objetos 3D cuando la cámara detecta la imagen -->
        <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
            
            <!-- Cancha / Portería (Fondo) -->
            <a-plane color="#2e8b57" height="1" width="1.5" position="0 0 -0.1" rotation="0 0 0"></a-plane>
            <a-box color="white" depth="0.05" height="0.4" width="0.8" position="0 0.2 -0.05" opacity="0.3"></a-box>

            <!-- Portero (Se moverá en el eje X) -->
            <a-box id="keeper-3d" color="#ff0000" depth="0.1" height="0.2" width="0.15" position="0 0.1 0"></a-box>

            <!-- Jugador (Cilindro que representa al jugador de espaldas) -->
            <a-cylinder color="#0000ff" height="0.25" radius="0.08" position="0 -0.3 0.3"></a-cylinder>

            <!-- Balón -->
            <a-sphere id="ball-3d" color="#ffffff" radius="0.04" position="0 -0.3 0.15"></a-sphere>

        </a-entity>
    </a-scene>

    <script>
        // Variables lógicas
        let score = 0;
        let isShooting = false;
        let keeperDirection = 1;
        let keeperSpeed = 0.01;
        let animationFrameId;

        // Elementos UI
        const scoreEl = document.getElementById('score');
        const shootBtn = document.getElementById('shoot-btn');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scanningOverlay = document.getElementById('scanning-overlay');

        // Elementos 3D
        const targetEntity = document.getElementById('ar-target');
        const keeper3D = document.getElementById('keeper-3d');
        const ball3D = document.getElementById('ball-3d');

        // Posiciones iniciales
        const ballStartX = 0;
        const ballStartY = -0.3;
        const ballStartZ = 0.15;

        // Detectar cuando la cámara encuentra la imagen objetivo
        targetEntity.addEventListener("targetFound", () => {
            scanningOverlay.style.display = "none";
            shootBtn.style.display = "block";
            startGameLoop();
        });

        // Detectar cuando se pierde la imagen
        targetEntity.addEventListener("targetLost", () => {
            scanningOverlay.style.display = "block";
            shootBtn.style.display = "none";
            cancelAnimationFrame(animationFrameId);
        });

        // Bucle de juego (Movimiento del portero)
        function startGameLoop() {
            let keeperPos = keeper3D.getAttribute('position');
            
            // Mover portero de izquierda a derecha (Límites: -0.3 a 0.3)
            keeperPos.x += keeperSpeed * keeperDirection;
            if (keeperPos.x > 0.3 || keeperPos.x < -0.3) {
                keeperDirection *= -1;
            }
            keeper3D.setAttribute('position', keeperPos);

            animationFrameId = requestAnimationFrame(startGameLoop);
        }

        // Función para patear (Animación del balón)
        function shootBall() {
            if (isShooting) return;
            isShooting = true;
            shootBtn.style.opacity = "0.5";

            // Animamos el balón hacia la portería (eje Y sube un poco, eje Z va al fondo)
            let currentZ = ballStartZ;
            let currentY = ballStartY;

            const shootInterval = setInterval(() => {
                currentZ -= 0.02; // Avanza hacia el fondo
                currentY += 0.01; // Se eleva ligeramente
                
                ball3D.setAttribute('position', { x: 0, y: currentY, z: currentZ });

                // Comprobar colisión cuando el balón llega a la línea del portero (Z aprox 0)
                if (currentZ <= 0.02 && currentZ >= -0.02) {
                    let kPos = keeper3D.getAttribute('position');
                    
                    // Si el portero está en el centro (cerca de x=0), es ATAJADA
                    if (Math.abs(kPos.x) < 0.12) {
                        clearInterval(shootInterval);
                        triggerGameOver();
                    }
                }

                // Si pasa la línea del portero sin chocar (Z < -0.05), es GOL
                if (currentZ < -0.05) {
                    clearInterval(shootInterval);
                    scoreGoal();
                }

            }, 20); // 20ms por frame para el tiro
        }

        function scoreGoal() {
            score++;
            scoreEl.innerText = score;
            keeperSpeed += 0.002; // Aumentar dificultad
            
            setTimeout(() => {
                resetBall();
            }, 1000);
        }

        function triggerGameOver() {
            cancelAnimationFrame(animationFrameId);
            shootBtn.style.display = "none";
            gameOverScreen.style.display = "flex";
        }

        function resetBall() {
            ball3D.setAttribute('position', { x: ballStartX, y: ballStartY, z: ballStartZ });
            isShooting = false;
            shootBtn.style.opacity = "1";
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            keeperSpeed = 0.01;
            resetBall();
            gameOverScreen.style.display = "none";
            shootBtn.style.display = "block";
            startGameLoop();
        }
    </script>
</body>
</html>
