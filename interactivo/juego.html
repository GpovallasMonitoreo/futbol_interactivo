<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego: Tiros de Penal 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #061423;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Share Tech Mono', monospace;
            color: white;
        }

        /* Marcador de goles */
        #scoreboard {
            font-size: 30px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Contenedor del campo de juego */
        #game-area {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 400px;
            background-color: #2e8b57; /* Verde césped */
            border: 5px solid #ffffff;
            border-radius: 10px;
            overflow: hidden;
            cursor: crosshair; /* El cursor parece una mira */
        }

        /* Líneas del área de penal */
        .penalty-box {
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 150px;
            border: 3px solid white;
            border-bottom: none;
        }

        /* Portería (Goal) */
        #goal {
            position: absolute;
            top: 20px;
            left: 25%;
            width: 50%;
            height: 100px;
            border: 5px solid white;
            border-bottom: none;
            background-color: rgba(255, 255, 255, 0.2); /* Red simulada */
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Portero */
        #keeper {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            transition: left 0.1s linear; /* Movimiento suave pero predecible para colisiones */
            z-index: 10;
        }

        /* Balón de Fútbol */
        #ball {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            /* La transición crea la animación del tiro */
            transition: top 0.5s ease-out, left 0.5s ease-out, transform 0.5s;
            z-index: 20;
        }

        /* Mensaje flotante (¡Gol! o ¡Atajada!) */
        #message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 20px #000;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 30;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="scoreboard">Goles: <span id="score">0</span> | Tiros: <span id="shots">0</span></div>

    <div id="game-area">
        <div class="penalty-box"></div>
        <div id="goal"></div>
        <div id="keeper">🧤</div>
        <div id="ball">⚽</div>
        <div id="message">¡GOL!</div>
    </div>

    <script>
        const gameArea = document.getElementById('game-area');
        const ball = document.getElementById('ball');
        const keeper = document.getElementById('keeper');
        const scoreDisplay = document.getElementById('score');
        const shotsDisplay = document.getElementById('shots');
        const message = document.getElementById('message');

        let score = 0;
        let shots = 0;
        let isShooting = false;
        
        // Variables para el movimiento del portero
        let keeperDirection = 1;
        let keeperSpeed = 3;
        let keeperPos = 50; // Porcentaje (empieza en el centro)

        // Función para mover al portero constantemente
        function moveKeeper() {
            keeperPos += keeperSpeed * keeperDirection;
            
            // Rebotar en los bordes de la portería (25% a 75% del ancho aprox)
            if (keeperPos > 70 || keeperPos < 30) {
                keeperDirection *= -1; // Cambiar dirección
            }
            
            keeper.style.left = keeperPos + '%';
            requestAnimationFrame(moveKeeper);
        }
        
        // Iniciar movimiento del portero
        moveKeeper();

        // Lógica para patear al hacer clic
        gameArea.addEventListener('click', function(e) {
            if (isShooting) return; // Evitar multiples tiros a la vez
            isShooting = true;
            shots++;
            shotsDisplay.innerText = shots;

            // Obtener coordenadas del clic relativas al área de juego
            const rect = gameArea.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // Animar el balón hacia donde se hizo clic
            ball.style.left = clickX + 'px';
            ball.style.top = clickY + 'px';
            ball.style.transform = 'translate(-50%, -50%) rotate(360deg)';

            // Esperar a que la animación termine (0.5s) para evaluar el resultado
            setTimeout(() => {
                evaluateShot();
            }, 500);
        });

        function evaluateShot() {
            const ballRect = ball.getBoundingClientRect();
            const keeperRect = keeper.getBoundingClientRect();
            const goalRect = document.getElementById('goal').getBoundingClientRect();

            // Detectar colisión con el portero
            const hitKeeper = !(
                ballRect.top > keeperRect.bottom ||
                ballRect.bottom < keeperRect.top ||
                ballRect.right < keeperRect.left ||
                ballRect.left > keeperRect.right
            );

            // Detectar si el balón está dentro del área de la portería
            const inGoalX = ballRect.left >= goalRect.left && ballRect.right <= goalRect.right;
            const inGoalY = ballRect.top >= goalRect.top && ballRect.bottom <= goalRect.bottom;
            const insideGoal = inGoalX && inGoalY;

            if (hitKeeper) {
                showMessage("¡ATAJADA! 🚫", "red");
            } else if (insideGoal) {
                score++;
                scoreDisplay.innerText = score;
                showMessage("¡GOLAZO! ⚽", "gold");
                // Aumentar la velocidad del portero para hacerlo más difícil
                keeperSpeed += 0.5; 
            } else {
                showMessage("¡AFUERA! ❌", "white");
            }

            // Reiniciar el balón después de un momento
            setTimeout(resetBall, 1500);
        }

        function showMessage(text, color) {
            message.innerText = text;
            message.style.color = color;
            message.style.opacity = 1;
        }

        function resetBall() {
            message.style.opacity = 0;
            // Quitar transición temporalmente para que vuelva de inmediato
            ball.style.transition = 'none';
            ball.style.top = 'auto';
            ball.style.bottom = '20px';
            ball.style.left = '50%';
            ball.style.transform = 'translateX(-50%) rotate(0deg)';
            
            // Forzar reflow y volver a poner la transición
            void ball.offsetWidth;
            ball.style.transition = 'top 0.5s ease-out, left 0.5s ease-out, transform 0.5s';
            
            isShooting = false;
        }
    </script>

</body>
</html>
